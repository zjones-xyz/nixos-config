# sops-nix key configuration.
#
# To add memory-alpha's age key:
#   1. On the machine: ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub
#   2. Paste the output as the `age` value below.
#
# To create/edit secrets:
#   sops secrets/memory-alpha.yaml
#
# hopper's age key: same procedure on the Pi —
#   ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub
# then replace the placeholder below and run `sops updatekeys secrets/hopper.yaml`.

keys:
  - &admin age10xxhjwmlntkw3q7wggqhq3jvjr0eycscrtdknpf7kw6mmmy75p0syt2twm
  - &memory-alpha age13790dgm55mp5luu7pdpqewjxh0he5dlhnagp5wuk9dte0ks5gc6qp09882
  # TODO: replace with hopper's real age pubkey after first boot, then add
  #   *hopper to the hopper rule below and run: sops updatekeys secrets/hopper.yaml
  - &hopper age1placeholderreplacewithhoppersrealagekeyafterfirstboot000000000
  # TODO: replace with hamilton's real age pubkey after first boot, then add
  #   *hamilton to the hamilton rule below and run: sops updatekeys secrets/hamilton.yaml
  - &hamilton age1placeholderreplacewithhamiltonsrealagekeyafterfirstboot00000000000000
  - &pegasus age1p4gelxhaxllpw0d8whdn2wfdqxml0y7tm3md3n8yface2zvlgqnschegth
  # TODO: replace with the agent-sandbox guest's real age pubkey after its
  #   first boot (ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub, from inside
  #   the guest), then add *agent-sandbox to the rule below and run:
  #   sops updatekeys secrets/agent-sandbox.yaml
  #   See docs/microvm-sandbox/SECRETS-TODO.md for the full ceremony.
  - &agent-sandbox age1placeholderreplacewiththeguestsrealagekeyafterfirstboot0

creation_rules:
  - path_regex: secrets/memory-alpha\.yaml$
    key_groups:
      - age:
          - *admin
          - *memory-alpha
  # hopper/hamilton: until each Pi has booted and its real age key is known, the
  # files are encrypted to admin (edit from the Mac) + memory-alpha (the build
  # host, which validates secrets at image-build time). Add *hopper / *hamilton
  # after first boot so the host itself can decrypt at activation.
  - path_regex: secrets/hopper\.yaml$
    key_groups:
      - age:
          - *admin
          - *memory-alpha
  - path_regex: secrets/hamilton\.yaml$
    key_groups:
      - age:
          - *admin
          - *memory-alpha
  - path_regex: secrets/pegasus\.yaml$
    key_groups:
      - age:
          - *admin
          - *pegasus
