# sops-nix key configuration.
#
# To add memory-alpha's age key:
#   1. On the machine: ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub
#   2. Paste the output as the `age` value below.
#
# To create/edit secrets:
#   sops secrets/memory-alpha.yaml

keys:
  - &memory-alpha age1REPLACE_WITH_OUTPUT_OF_SSH_TO_AGE

creation_rules:
  - path_regex: secrets/memory-alpha\.yaml$
    key_groups:
      - age:
          - *memory-alpha
