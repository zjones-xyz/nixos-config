name: Nix flake check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: nix flake check
        run: nix flake check --no-build

      - name: Evaluate all configuration outputs
        run: |
          for attr in $(nix eval --json .#nixosConfigurations --apply builtins.attrNames | jq -r '.[]'); do
            echo "== nixosConfigurations.$attr =="
            nix eval ".#nixosConfigurations.$attr.config.system.build.toplevel.drvPath"
          done
          for attr in $(nix eval --json .#darwinConfigurations --apply builtins.attrNames | jq -r '.[]'); do
            echo "== darwinConfigurations.$attr =="
            nix eval ".#darwinConfigurations.$attr.config.system.build.toplevel.drvPath"
          done

      - name: Build memory-alpha (x86_64-linux, native)
        run: nix build .#nixosConfigurations.memory-alpha.config.system.build.toplevel --no-link
